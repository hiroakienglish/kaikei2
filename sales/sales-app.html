<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>売上管理帳</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f4f4f6; color: #1a1a2e; font-size: 14px; }

  .app { max-width: 820px; margin: 0 auto; padding-bottom: 3rem; }

  /* Header */
  .header { background: #1a1a2e; padding: 1.25rem 1.5rem 0; border-radius: 0 0 12px 12px; margin-bottom: 1.5rem; }
  .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 1rem; }
  .header-title { color: #e2e8f0; font-size: 22px; font-weight: 500; }
  .header-sub { color: #94a3b8; font-size: 13px; margin-top: 2px; }
  .header-stats { display: flex; gap: 8px; }
  .stat-box { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 14px; text-align: center; }
  .stat-label { color: #94a3b8; font-size: 11px; }
  .stat-value { color: #f1f5f9; font-size: 18px; font-weight: 500; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; }
  .tab-btn { background: transparent; color: #94a3b8; border: none; border-radius: 6px 6px 0 0; padding: 8px 16px; cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.15s; }
  .tab-btn.active { background: #fff; color: #1a1a2e; font-weight: 500; }

  /* Main content */
  .content { padding: 0 1rem; }
  .section { display: none; }
  .section.active { display: block; }

  /* Cards / panels */
  .panel { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .panel-pad { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 16px; }
  .panel-secondary { background: #f8f8f9; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; }

  /* Date row */
  .date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .date-row label { font-size: 14px; color: #555; white-space: nowrap; }
  input[type="date"] { font-size: 14px; padding: 6px 10px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
  .btn-today { font-size: 13px; padding: 6px 12px; border-radius: 6px; border: 1px solid #ccc; background: #f0f0f2; cursor: pointer; color: #555; font-family: inherit; }
  .btn-today:hover { background: #e4e4e8; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 14px; font-weight: 500; color: #666; background: #f8f8f9; }
  th.center { text-align: center; }
  th.right { text-align: right; }
  td { padding: 9px 14px; border-top: 0.5px solid rgba(0,0,0,0.1); vertical-align: middle; }
  td.center { text-align: center; }
  td.right { text-align: right; }
  tr.has-qty td { background: rgba(50,102,173,0.04); }
  tfoot tr td { background: #f8f8f9; font-weight: 500; border-top: 1px solid rgba(0,0,0,0.15); }
  .total-amount { font-size: 18px; font-weight: 500; color: #3266ad; text-align: right; padding: 12px 14px; }

  /* Buttons */
  .btn { padding: 7px 16px; border-radius: 6px; border: 1px solid #ccc; background: #f0f0f2; cursor: pointer; font-size: 13px; font-family: inherit; }
  .btn:hover { background: #e4e4e8; }
  .btn-primary { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .btn-primary:hover { background: #2a2a4e; }
  .btn-success { background: #2b9a6b; color: #fff; border-color: #2b9a6b; }
  .btn-success:hover { background: #228055; }
  .btn-danger { color: #e24b4a; background: transparent; border-color: #e24b4a; }
  .btn-danger:hover { background: #fff0f0; }
  .btn-icon { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #ddd; background: #f8f8f9; cursor: pointer; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; font-family: inherit; }
  .btn-icon:hover { background: #eee; }
  .btn-save { font-size: 12px; padding: 4px 8px; border-radius: 4px; border: none; background: #3266ad; color: #fff; cursor: pointer; font-family: inherit; }
  .btn-cancel { font-size: 12px; padding: 4px 6px; border-radius: 4px; border: 1px solid #ccc; background: transparent; cursor: pointer; color: #666; font-family: inherit; }
  .btn-edit { font-size: 11px; padding: 3px 6px; border: 1px solid #ddd; border-radius: 4px; background: transparent; cursor: pointer; color: #aaa; font-family: inherit; }
  .btn-edit:hover { color: #555; border-color: #aaa; }
  .btn-delete-row { font-size: 12px; color: #e24b4a; border: none; background: transparent; cursor: pointer; font-family: inherit; }
  .btn-trash { width: 26px; height: 26px; border-radius: 4px; border: 1px solid #ddd; background: transparent; cursor: pointer; font-size: 13px; color: #aaa; font-family: inherit; }
  .btn-trash:hover { color: #e24b4a; border-color: #e24b4a; background: #fff0f0; }
  .btn-chart { padding: 7px 16px; border-radius: 6px; border: 1.5px solid #ccc; background: transparent; color: #555; cursor: pointer; font-size: 13px; font-family: inherit; }
  .btn-chart.active { background: #3266ad; color: #fff; border-color: #3266ad; font-weight: 500; }

  /* Editable spans */
  .editable { cursor: pointer; border-bottom: 1px dashed #bbb; padding-bottom: 1px; }
  .editable:hover { border-bottom-color: #666; }

  /* Inline edit */
  .inline-edit { display: flex; align-items: center; gap: 4px; }
  input.small { font-size: 14px; padding: 4px 6px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit; }
  input.small-center { width: 60px; text-align: center; }
  input.small-price { width: 80px; text-align: right; }
  input.small-name { width: 110px; }

  /* Qty controls */
  .qty-row { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .qty-num { min-width: 28px; text-align: center; font-weight: 500; }

  /* Add product row */
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .add-row input { flex: 1 1 120px; min-width: 100px; font-size: 14px; padding: 7px 10px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
  .add-row input.price-input { flex: 0 0 100px; }

  /* Metric cards */
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .metric-card { background: #f0f0f2; border-radius: 8px; padding: 12px 16px; }
  .metric-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 500; }

  /* Chart area */
  .chart-box { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1rem; margin-bottom: 16px; }
  .chart-label { font-size: 13px; color: #666; margin-bottom: 8px; }
  .chart-wrap { position: relative; }

  /* Search */
  .search-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .search-row input { flex: 1; font-size: 14px; padding: 7px 10px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }

  /* Rank badge */
  .badge-no1 { font-size: 11px; background: #faeeda; color: #854f0b; border-radius: 4px; padding: 2px 6px; margin-right: 6px; }
  .rank-top { color: #e8703a; font-weight: 500; }

  /* CSV textarea */
  textarea { width: 100%; font-size: 13px; font-family: monospace; resize: vertical; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; background: #f8f8f9; }
  .paste-result { font-size: 13px; margin-top: 8px; }
  .paste-ok { color: #2b9a6b; }
  .paste-err { color: #e24b4a; }

  /* Utils */
  .color-blue { color: #3266ad; }
  .color-muted { color: #aaa; }
  .color-danger { color: #e24b4a; }
  .flex-row { display: flex; gap: 8px; align-items: center; }
  .mt-8 { margin-top: 8px; }
  .mt-10 { margin-top: 10px; }
  .section-title { font-weight: 500; margin-bottom: 6px; }
  .section-desc { font-size: 13px; color: #666; margin-bottom: 12px; }
  .empty-msg { text-align: center; padding: 2rem; color: #aaa; }
  code.inline { background: #f0f0f2; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  .hint { font-size: 13px; color: #aaa; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">売上管理帳</div>
        <div class="header-sub">商品別・日別 売上記録</div>
      </div>
      <div class="header-stats">
        <div class="stat-box">
          <div class="stat-label">本日売上</div>
          <div class="stat-value" id="stat-today">¥0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">累計売上</div>
          <div class="stat-value" id="stat-total">¥0</div>
        </div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('input')">売上入力</button>
      <button class="tab-btn" onclick="switchTab('history')">履歴</button>
      <button class="tab-btn" onclick="switchTab('analysis')">分析</button>
      <button class="tab-btn" onclick="switchTab('import')">取込・出力</button>
    </div>
  </div>

  <div class="content">

    <!-- ===== 売上入力 ===== -->
    <div class="section active" id="sec-input">
      <div class="date-row">
        <label>対象日：</label>
        <input type="date" id="date-picker" onchange="onDateChange()">
        <button class="btn-today" onclick="setToday()">今日</button>
      </div>

      <div class="panel">
        <table id="input-table">
          <thead>
            <tr>
              <th style="width:32%">商品名</th>
              <th class="center" style="width:22%">単価 (¥)</th>
              <th class="center" style="width:24%">数量</th>
              <th class="right" style="width:16%">小計</th>
              <th style="width:6%"></th>
            </tr>
          </thead>
          <tbody id="product-tbody"></tbody>
          <tfoot>
            <tr>
              <td colspan="3" style="padding:12px 14px">本日合計</td>
              <td class="total-amount" id="today-total">¥0</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div class="panel-secondary">
        <div style="font-size:13px;color:#666;font-weight:500;margin-bottom:8px">商品を追加</div>
        <div class="add-row">
          <input type="text" id="new-product-name" placeholder="商品名" onkeydown="if(event.key==='Enter')addProduct()">
          <input type="number" id="new-product-price" placeholder="単価 (¥)" class="price-input" onkeydown="if(event.key==='Enter')addProduct()">
          <button class="btn btn-primary" onclick="addProduct()">追加</button>
        </div>
      </div>
    </div>

    <!-- ===== 履歴 ===== -->
    <div class="section" id="sec-history">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="商品名・日付で検索..." oninput="renderHistory()">
        <button class="btn" onclick="document.getElementById('search-input').value='';renderHistory()">クリア</button>
      </div>
      <div class="panel">
        <table>
          <thead>
            <tr>
              <th style="width:18%">日付</th>
              <th>商品名</th>
              <th class="center" style="width:10%">数量</th>
              <th class="right" style="width:12%">単価</th>
              <th class="right" style="width:14%">売上</th>
              <th class="center" style="width:8%"></th>
            </tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
      </div>
      <div id="history-hint" class="hint"></div>
    </div>

    <!-- ===== 分析 ===== -->
    <div class="section" id="sec-analysis">
      <div class="metric-grid">
        <div class="metric-card"><div class="metric-label">累計売上</div><div class="metric-value" id="m-revenue">¥0</div></div>
        <div class="metric-card"><div class="metric-label">総販売数</div><div class="metric-value" id="m-qty">0個</div></div>
        <div class="metric-card"><div class="metric-label">営業日数</div><div class="metric-value" id="m-days">0日</div></div>
        <div class="metric-card"><div class="metric-label">商品種類</div><div class="metric-value" id="m-kinds">0種</div></div>
      </div>
      <div class="flex-row" style="margin-bottom:12px">
        <button class="btn-chart active" id="chart-btn-trend" onclick="switchChart('trend')">日別売上トレンド</button>
        <button class="btn-chart" id="chart-btn-rank" onclick="switchChart('rank')">売れ筋ランキング</button>
      </div>
      <div id="chart-trend-area" class="chart-box">
        <div class="chart-label">過去14日間の売上</div>
        <div class="chart-wrap" style="height:260px"><canvas id="chart-trend"></canvas></div>
      </div>
      <div id="chart-rank-area" style="display:none">
        <div class="chart-box">
          <div class="chart-label">商品別売上ランキング</div>
          <div class="chart-wrap" id="rank-chart-wrap" style="height:240px"><canvas id="chart-rank"></canvas></div>
        </div>
        <div class="panel">
          <table>
            <thead>
              <tr>
                <th class="center" style="width:10%">順位</th>
                <th>商品名</th>
                <th class="right" style="width:14%">販売数</th>
                <th class="right" style="width:16%">売上金額</th>
                <th class="right" style="width:12%">構成比</th>
              </tr>
            </thead>
            <tbody id="rank-tbody"></tbody>
          </table>
        </div>
      </div>
      <div id="analysis-empty" class="empty-msg" style="display:none">売上データを入力すると分析が表示されます</div>
    </div>

    <!-- ===== 取込・出力 ===== -->
    <div class="section" id="sec-import">
      <div class="panel-pad">
        <div class="section-title">CSVデータ取込</div>
        <div class="section-desc">形式：<code class="inline">日付,商品名,数量,単価</code>　（1行目はヘッダー行）</div>
        <textarea id="paste-area" rows="7" placeholder="日付,商品名,数量,単価&#10;2024/01/15,コーヒー,10,480&#10;2024/01/15,ケーキ,5,650"></textarea>
        <div class="flex-row mt-10">
          <button class="btn btn-primary" onclick="importCSV()">データを取込む</button>
          <span id="paste-result"></span>
        </div>
      </div>

      <div class="panel-pad">
        <div class="section-title">CSVエクスポート</div>
        <div class="section-desc">全データをCSVファイルとしてダウンロードします。</div>
        <div class="flex-row">
          <button class="btn btn-success" onclick="exportCSV()">CSVダウンロード</button>
          <span id="export-count" style="font-size:13px;color:#666"></span>
        </div>
      </div>

      <div class="panel-pad">
        <div class="section-title color-danger">データリセット</div>
        <div class="section-desc">すべてのデータを削除します。この操作は元に戻せません。</div>
        <button class="btn btn-danger" onclick="resetAll()">全データを削除</button>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<script>
const STORAGE_KEY = 'sales-accounting-data-v1';
const PRESET_PRODUCTS = ['コーヒー', '紅茶', 'ケーキ', 'クッキー', 'サンドイッチ', 'ジュース'];
const COLORS = ['#3266ad','#e8703a','#2b9a6b','#b5490d','#6b46c1','#c2185b','#0288d1','#388e3c'];

let records = [];
let products = [...PRESET_PRODUCTS];
let selectedDate = todayStr();
let currentTab = 'input';
let currentChart = 'trend';
let trendChart = null;
let rankChart = null;

// ── Helpers ──────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ records, products }));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d) { records = d.records || []; products = d.products || [...PRESET_PRODUCTS]; }
  } catch {}
}

function getQty(product) {
  const r = records.find(r => r.date === selectedDate && r.product === product);
  return r ? r.qty : 0;
}

function getPrice(product) {
  const r = records.find(r => r.date === selectedDate && r.product === product);
  if (r && r.price) return r.price;
  const any = records.find(r => r.product === product && r.price);
  return any ? any.price : 0;
}

function upsertRecord(date, product, qty, price) {
  const idx = records.findIndex(r => r.date === date && r.product === product);
  if (idx >= 0) { records[idx] = { date, product, qty, price }; }
  else { records.push({ date, product, qty, price }); }
  save();
}

function deleteRecord(date, product) {
  records = records.filter(r => !(r.date === date && r.product === product));
  save();
}

function todayTotal() {
  return records.filter(r => r.date === selectedDate).reduce((s,r) => s + r.qty * r.price, 0);
}

function totalRevenue() {
  return records.reduce((s,r) => s + r.qty * r.price, 0);
}

function allProducts() {
  const set = new Set([...products, ...records.map(r => r.product)]);
  return [...set];
}

function productTotals() {
  return allProducts().map(p => {
    const recs = records.filter(r => r.product === p);
    return { product: p, qty: recs.reduce((s,r) => s+r.qty, 0), revenue: recs.reduce((s,r) => s+r.qty*r.price, 0) };
  }).filter(p => p.qty > 0).sort((a,b) => b.revenue - a.revenue);
}

// ── Tab switching ──────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['input','history','analysis','import'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  currentTab = tab;
  if (tab === 'input') renderInputTable();
  if (tab === 'history') renderHistory();
  if (tab === 'analysis') renderAnalysis();
  if (tab === 'import') document.getElementById('export-count').textContent = records.length + '件のデータ';
}

// ── Date ──────────────────────────────────────────
function onDateChange() {
  selectedDate = document.getElementById('date-picker').value.replace(/-/g,'/');
  renderInputTable();
}

function setToday() {
  selectedDate = todayStr();
  document.getElementById('date-picker').value = selectedDate.replace(/\//g,'-');
  renderInputTable();
}

// ── Input table ──────────────────────────────────────────
function renderInputTable() {
  const prods = allProducts().filter(p => products.includes(p) || records.find(r => r.date===selectedDate && r.product===p));
  const tbody = document.getElementById('product-tbody');
  tbody.innerHTML = '';

  prods.forEach(product => {
    const qty = getQty(product);
    const price = getPrice(product);
    const tr = document.createElement('tr');
    if (qty > 0) tr.className = 'has-qty';

    // 商品名セル
    tr.innerHTML = `
      <td id="name-cell-${CSS.escape(product)}">
        <span class="editable" title="クリックして名前を変更" onclick="startEditName('${esc(product)}')">${esc(product)}</span>
      </td>
      <td class="center" id="price-cell-${CSS.escape(product)}">
        <span class="editable" title="クリックして単価を変更" onclick="startEditPrice('${esc(product)}')">${price ? '¥'+price.toLocaleString() : '—'}</span>
      </td>
      <td class="center" id="qty-cell-${CSS.escape(product)}">
        <div class="qty-row">
          <button class="btn-icon" onclick="changeQty('${esc(product)}',-1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="btn-icon" onclick="changeQty('${esc(product)}',1)">＋</button>
          <button class="btn-edit" onclick="startEditQty('${esc(product)}')">編集</button>
        </div>
      </td>
      <td class="right" style="font-weight:500;color:${qty>0?'#3266ad':'#aaa'}">
        ${qty>0 ? '¥'+(qty*price).toLocaleString() : '—'}
        ${qty>0 ? `<button class="btn-delete-row" onclick="deleteRecord('${esc(selectedDate)}','${esc(product)}');renderAll()">×</button>` : ''}
      </td>
      <td class="center"><button class="btn-trash" title="商品を削除" onclick="deleteProduct('${esc(product)}')">🗑</button></td>
    `;
    tbody.appendChild(tr);
  });

  updateHeader();
}

function esc(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function changeQty(product, delta) {
  const qty = Math.max(0, getQty(product) + delta);
  const price = getPrice(product);
  upsertRecord(selectedDate, product, qty, price);
  renderInputTable();
}

function startEditQty(product) {
  const qty = getQty(product);
  const price = getPrice(product);
  const cell = document.getElementById('qty-cell-' + CSS.escape(product));
  cell.innerHTML = `<div class="inline-edit">
    <input class="small small-center" type="number" id="edit-qty-input" value="${qty}" min="0" onkeydown="if(event.key==='Enter')saveEditQty('${esc(product)}');if(event.key==='Escape')renderInputTable()">
    <button class="btn-save" onclick="saveEditQty('${esc(product)}')">保存</button>
    <button class="btn-cancel" onclick="renderInputTable()">×</button>
  </div>`;
  document.getElementById('edit-qty-input').focus();
}

function saveEditQty(product) {
  const val = Math.max(0, parseInt(document.getElementById('edit-qty-input').value) || 0);
  const price = getPrice(product);
  upsertRecord(selectedDate, product, val, price);
  renderInputTable();
}

function startEditPrice(product) {
  const price = getPrice(product);
  const cell = document.getElementById('price-cell-' + CSS.escape(product));
  cell.innerHTML = `<div class="inline-edit">
    <input class="small small-price" type="number" id="edit-price-input" value="${price||''}" min="0" onkeydown="if(event.key==='Enter')saveEditPrice('${esc(product)}');if(event.key==='Escape')renderInputTable()">
    <button class="btn-save" onclick="saveEditPrice('${esc(product)}')">保存</button>
    <button class="btn-cancel" onclick="renderInputTable()">×</button>
  </div>`;
  document.getElementById('edit-price-input').focus();
}

function saveEditPrice(product) {
  const newPrice = Math.max(0, parseInt(document.getElementById('edit-price-input').value) || 0);
  records = records.map(r => r.product === product ? { ...r, price: newPrice } : r);
  const qty = getQty(product);
  upsertRecord(selectedDate, product, qty, newPrice);
  save();
  renderInputTable();
}

function startEditName(product) {
  const cell = document.getElementById('name-cell-' + CSS.escape(product));
  cell.innerHTML = `<div class="inline-edit">
    <input class="small small-name" type="text" id="edit-name-input" value="${product}" onkeydown="if(event.key==='Enter')saveEditName('${esc(product)}');if(event.key==='Escape')renderInputTable()">
    <button class="btn-save" onclick="saveEditName('${esc(product)}')">保存</button>
    <button class="btn-cancel" onclick="renderInputTable()">×</button>
  </div>`;
  document.getElementById('edit-name-input').focus();
}

function saveEditName(oldName) {
  const newName = document.getElementById('edit-name-input').value.trim();
  if (!newName || newName === oldName || products.includes(newName)) { renderInputTable(); return; }
  products = products.map(p => p === oldName ? newName : p);
  records = records.map(r => r.product === oldName ? { ...r, product: newName } : r);
  save();
  renderInputTable();
}

function addProduct() {
  const name = document.getElementById('new-product-name').value.trim();
  const priceVal = parseInt(document.getElementById('new-product-price').value) || 0;
  if (!name || products.includes(name)) return;
  products.push(name);
  if (priceVal > 0) upsertRecord(selectedDate, name, 0, priceVal);
  save();
  document.getElementById('new-product-name').value = '';
  document.getElementById('new-product-price').value = '';
  renderInputTable();
}

function deleteProduct(product) {
  const hasRecords = records.some(r => r.product === product);
  const msg = hasRecords
    ? `「${product}」を削除すると、この商品の売上データもすべて削除されます。よろしいですか？`
    : `「${product}」を商品リストから削除しますか？`;
  if (!confirm(msg)) return;
  products = products.filter(p => p !== product);
  records = records.filter(r => r.product !== product);
  save();
  renderInputTable();
}

// ── History ──────────────────────────────────────────
function renderHistory() {
  const q = document.getElementById('search-input').value;
  const filtered = records
    .filter(r => !q || r.product.includes(q) || r.date.includes(q))
    .sort((a,b) => (b.date+b.product).localeCompare(a.date+a.product));
  const tbody = document.getElementById('history-tbody');
  tbody.innerHTML = '';
  const show = filtered.slice(0,100);
  if (show.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">データがありません</td></tr>';
  } else {
    show.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="color:#888;font-size:13px">${r.date}</td>
        <td>${r.product}</td>
        <td class="center">${r.qty}</td>
        <td class="right" style="color:#888;font-size:13px">¥${r.price.toLocaleString()}</td>
        <td class="right" style="font-weight:500;color:#3266ad">¥${(r.qty*r.price).toLocaleString()}</td>
        <td class="center"><button class="btn-delete-row" onclick="deleteRecord('${esc(r.date)}','${esc(r.product)}');renderAll()">削除</button></td>
      `;
      tbody.appendChild(tr);
    });
  }
  document.getElementById('history-hint').textContent = filtered.length > 100 ? `最初の100件を表示中（全${filtered.length}件）` : '';
}

// ── Analysis ──────────────────────────────────────────
function renderAnalysis() {
  const rev = totalRevenue();
  const qty = records.reduce((s,r) => s+r.qty, 0);
  const days = [...new Set(records.map(r => r.date))].length;
  const pt = productTotals();

  document.getElementById('m-revenue').textContent = '¥'+rev.toLocaleString();
  document.getElementById('m-qty').textContent = qty.toLocaleString()+'個';
  document.getElementById('m-days').textContent = days+'日';
  document.getElementById('m-kinds').textContent = pt.length+'種';

  if (records.length === 0) {
    document.getElementById('analysis-empty').style.display = 'block';
    document.getElementById('chart-trend-area').style.display = 'none';
    document.getElementById('chart-rank-area').style.display = 'none';
    return;
  }
  document.getElementById('analysis-empty').style.display = 'none';

  renderCharts();
  renderRankTable(pt, rev);
}

function switchChart(mode) {
  currentChart = mode;
  document.getElementById('chart-btn-trend').classList.toggle('active', mode==='trend');
  document.getElementById('chart-btn-rank').classList.toggle('active', mode==='rank');
  document.getElementById('chart-trend-area').style.display = mode==='trend' ? 'block' : 'none';
  document.getElementById('chart-rank-area').style.display = mode==='rank' ? 'block' : 'none';
  renderCharts();
}

function renderCharts() {
  const allDates = [...new Set(records.map(r => r.date))].sort();
  const dailySales = allDates.map(date => ({
    date,
    total: records.filter(r => r.date===date).reduce((s,r) => s+r.qty*r.price, 0)
  }));

  if (currentChart === 'trend') {
    if (trendChart) { trendChart.destroy(); trendChart = null; }
    const last14 = dailySales.slice(-14);
    trendChart = new Chart(document.getElementById('chart-trend'), {
      type: 'bar',
      data: {
        labels: last14.map(d => d.date.slice(5)),
        datasets: [{ label: '売上', data: last14.map(d => d.total), backgroundColor: '#3266ad', borderRadius: 4 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { callback: v => '¥'+v.toLocaleString() } } }
      }
    });
  } else {
    const pt = productTotals().slice(0,8);
    const h = Math.max(200, pt.length * 44);
    document.getElementById('rank-chart-wrap').style.height = h + 'px';
    if (rankChart) { rankChart.destroy(); rankChart = null; }
    rankChart = new Chart(document.getElementById('chart-rank'), {
      type: 'bar',
      data: {
        labels: pt.map(p => p.product),
        datasets: [{ label: '売上金額', data: pt.map(p => p.revenue), backgroundColor: pt.map((_,i) => COLORS[i%COLORS.length]), borderRadius: 4 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, ticks: { callback: v => '¥'+v.toLocaleString() } } }
      }
    });
  }
}

function renderRankTable(pt, rev) {
  const tbody = document.getElementById('rank-tbody');
  tbody.innerHTML = '';
  pt.forEach((p,i) => {
    const tr = document.createElement('tr');
    const pct = rev > 0 ? (p.revenue/rev*100).toFixed(1) : '0.0';
    tr.innerHTML = `
      <td class="center ${i<3?'rank-top':''}">${i+1}</td>
      <td>${i===0?'<span class="badge-no1">No.1</span>':''}${p.product}</td>
      <td class="right" style="color:#888">${p.qty.toLocaleString()}個</td>
      <td class="right" style="font-weight:500">¥${p.revenue.toLocaleString()}</td>
      <td class="right" style="color:#888;font-size:13px">${pct}%</td>
    `;
    tbody.appendChild(tr);
  });
}

// ── Import / Export ──────────────────────────────────────────
function importCSV() {
  const text = document.getElementById('paste-area').value;
  const lines = text.trim().split(/\r?\n/);
  let count = 0;
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length >= 3) {
      const date = cols[0]?.trim(), product = cols[1]?.trim();
      const qty = parseInt(cols[2]?.trim()), price = parseInt(cols[3]?.trim()) || 0;
      if (date && product && !isNaN(qty)) {
        upsertRecord(date, product, qty, price);
        if (!products.includes(product)) products.push(product);
        count++;
      }
    }
  }
  const el = document.getElementById('paste-result');
  if (count === 0) {
    el.textContent = 'データが読み込めませんでした。形式を確認してください。';
    el.className = 'paste-result paste-err';
  } else {
    el.textContent = count + '件のデータを取り込みました。';
    el.className = 'paste-result paste-ok';
    document.getElementById('paste-area').value = '';
  }
  save();
  updateHeader();
}

function exportCSV() {
  const rows = ['日付,商品名,数量,単価,売上'];
  records.forEach(r => rows.push(`${r.date},${r.product},${r.qty},${r.price},${r.qty*r.price}`));
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '売上データ_' + todayStr().replace(/\//g,'') + '.csv';
  a.click(); URL.revokeObjectURL(url);
}

function resetAll() {
  if (confirm('本当にすべてのデータを削除しますか？')) {
    records = []; products = [...PRESET_PRODUCTS]; save(); renderAll();
  }
}

// ── Global render ──────────────────────────────────────────
function updateHeader() {
  document.getElementById('stat-today').textContent = '¥'+todayTotal().toLocaleString();
  document.getElementById('stat-total').textContent = '¥'+totalRevenue().toLocaleString();
}

function renderAll() {
  updateHeader();
  if (currentTab === 'input') renderInputTable();
  if (currentTab === 'history') renderHistory();
  if (currentTab === 'analysis') renderAnalysis();
  if (currentTab === 'import') document.getElementById('export-count').textContent = records.length + '件のデータ';
}

// ── Init ──────────────────────────────────────────
load();
document.getElementById('date-picker').value = selectedDate.replace(/\//g,'-');
renderAll();
</script>
